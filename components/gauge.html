<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    body {
        margin: 0;
        background: transparent;
        color: white;
        font-family: Arial, sans-serif;
    }
</style>
</head>

<body>
<div style="text-align:center; padding:20px;">

        <!-- Gauge -->
        <div style="
            width:240px;
            height:140px;
            background: conic-gradient(
                from 180deg at 50% 100%,
                #18c501 35%,   /* green */
                #f3ef0c 50%,  /* yellow */
                #df0909 66%  /* red */
            );

            border-radius:120px 120px 0 0;
            margin:0 auto;
            position:relative;
            box-shadow:0 6px 16px rgba(0,0,0,0.4);
        ">

        <!-- Needle -->
        <div style="
            position:absolute;
            bottom:0;
            left:50%;
            width:8px;
            height:110px;
            background:linear-gradient(to top,#333,#fff);
            border-radius:4px;
            transform-origin:bottom center;
            transform:translateX(-50%) rotate(((rotation_deg))deg);
            transition:transform 0.8s ease;
        "></div>

        <!-- Center dot -->
        <div style="
            position:absolute;
            bottom:10px;
            left:50%;
            transform:translateX(-50%);
            width:18px;
            height:18px;
            background:#222;
            border:4px solid #fff;
            border-radius:50%;
        "></div>

    </div>

    <!-- Text -->
    <div style="margin-top:22px; font-size:3rem; font-weight:bold;">
        {{churn_prob}}%
    </div>

    <div style="font-size:1.4rem; color:#ddd;">
        {{risk_text}}
    </div>

    <div style="font-size:1.1rem; color:#bbb; margin-top:6px;">
        Estimated Time to Churn: <strong>{{time_to_churn}} Days</strong>
    </div>

</div>
</body>
</html>
